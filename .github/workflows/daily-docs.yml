name: Daily Documentation Generator

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to push changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Documentation Script
        run: |
          node scripts/generate-docs.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "Documentation Bot"
          git config --global user.email "bot@pelra.app"
          
          git add ARCHITECTURE.md
          
          # Only commit if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "docs: auto-update architecture schema [skip ci]"
            git push
          else
            echo "No changes to documentation."
          fi
